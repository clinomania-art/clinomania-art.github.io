<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무료 일러스트 보관소</title>
  
  <!-- Tailwind CSS (디자인) 인터넷에서 바로 불러오기 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 인터넷에서 바로 불러오기 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- JSX 문법을 브라우저가 읽을 수 있게 번역해주는 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f9f9f9]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 아이콘 SVG 컴포넌트들 (외부 설치 없이 바로 사용하기 위해 직접 작성)
    const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const CopyIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const CheckIcon = ({size=16, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const ImageIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;

    // 로컬 테스트용 임시 데이터
    const initialData = [
      { id: 1, title: '웃는 고양이', filename: 'cat_smile.png', tags: ['동물', '고양이', '기쁨'] },
      { id: 2, title: '열심히 일하는 직장인', filename: 'worker_hard.png', tags: ['사람', '직장', '업무'] },
      { id: 3, title: '따뜻한 커피 한 잔', filename: 'coffee_warm.png', tags: ['음식', '음료', '휴식'] },
    ];

    function App() {
      const [illustrations, setIllustrations] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [toastMessage, setToastMessage] = useState(null);

      useEffect(() => {
        // Jekyll이 만들어둔 data.json을 불러옵니다.
        fetch('/data.json')
          .then((res) => {
            if (!res.ok) throw new Error('데이터를 찾을 수 없습니다.');
            return res.json();
          })
          .then((data) => {
            setIllustrations(data);
            setIsLoading(false);
          })
          .catch((error) => {
            console.warn('실제 데이터를 불러오지 못해 임시 데이터를 표시합니다.');
            setIllustrations(initialData); // 파일이 없으면 임시 데이터 표시
            setIsLoading(false);
          });
      }, []);

      const filteredIllustrations = illustrations.filter((item) => {
        const searchLower = searchTerm.toLowerCase();
        // 태그가 없는 경우를 대비한 안전 장치 추가
        const tags = item.tags || [];
        return (
          item.title.toLowerCase().includes(searchLower) ||
          tags.some((tag) => tag.toLowerCase().includes(searchLower))
        );
      });

      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(null), 2500);
      };

      const handleDownload = (filename) => {
        const url = `/assets/${filename}`;
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('이미지가 다운로드 되었습니다.');
      };

      const handleCopy = async (filename) => {
        const url = `/assets/${filename}`;
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Network error');
          const blob = await response.blob();
          
          await navigator.clipboard.write([
            new ClipboardItem({ [blob.type]: blob })
          ]);
          showToast('이미지가 클립보드에 복사되었습니다.');
        } catch (err) {
          try {
            const fullUrl = window.location.origin + url;
            await navigator.clipboard.writeText(fullUrl);
            showToast('이미지 주소가 복사되었습니다.');
          } catch (fallbackErr) {
            showToast('복사에 실패했습니다.');
          }
        }
      };

      return (
        <div className="min-h-screen text-gray-800 font-sans">
          {/* 헤더 부분 */}
          <header className="bg-white shadow-sm sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-2">
                <div className="w-10 h-10 bg-amber-400 rounded-full flex items-center justify-center text-white">
                  <ImageIcon />
                </div>
                <h1 className="text-2xl font-bold tracking-tight text-gray-900">
                  무료 일러스트 보관소
                </h1>
              </div>
              
              {/* 검색 바 */}
              <div className="relative w-full md:w-96">
                <input
                  type="text"
                  placeholder="일러스트 검색 (예: 고양이, 직장)..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all"
                />
                <div className="absolute left-3 top-2.5 text-gray-400">
                  <SearchIcon />
                </div>
              </div>
            </div>
          </header>

          {/* 메인 콘텐츠 */}
          <main className="max-w-6xl mx-auto px-4 py-8">
            {isLoading ? (
              <div className="text-center py-20 text-gray-500 animate-pulse">
                일러스트 목록을 불러오는 중입니다...
              </div>
            ) : filteredIllustrations.length > 0 ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                {filteredIllustrations.map((item) => (
                  <IllustrationCard 
                    key={item.id || item.filename} 
                    item={item} 
                    onDownload={handleDownload} 
                    onCopy={handleCopy} 
                  />
                ))}
              </div>
            ) : (
              <div className="text-center py-20 text-gray-500">
                검색 결과가 없습니다.
              </div>
            )}
          </main>

          {/* 꼬리말 */}
          <footer className="bg-white border-t border-gray-200 mt-12 py-8 text-center text-gray-500 text-sm">
            <p>본 사이트의 모든 일러스트는 무료로 사용할 수 있습니다.</p>
            <p className="mt-2">© 2026 무료 일러스트 보관소.</p>
          </footer>

          {/* 토스트 알림 */}
          {toastMessage && (
            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 z-50 transition-all duration-300">
              <CheckIcon size={18} className="text-green-400" />
              <span>{toastMessage}</span>
            </div>
          )}
        </div>
      );
    }

    function IllustrationCard({ item, onDownload, onCopy }) {
      const [isCopied, setIsCopied] = useState(false);

      const handleCopyClick = () => {
        onCopy(item.filename);
        setIsCopied(true);
        setTimeout(() => setIsCopied(false), 2000);
      };

      const tags = item.tags || [];

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow duration-300 group flex flex-col">
          {/* 이미지 영역 */}
          <div className="relative aspect-square p-4 flex items-center justify-center bg-gray-50 overflow-hidden">
            <img
              src={`/assets/${item.filename}`}
              onError={(e) => {
                e.target.onerror = null;
                e.target.src = `https://placehold.co/400x400/e2e8f0/64748b?text=${encodeURIComponent(item.title)}`;
              }}
              alt={item.title}
              className="max-w-full max-h-full object-contain transform group-hover:scale-105 transition-transform duration-300"
            />
          </div>

          {/* 정보 및 버튼 영역 */}
          <div className="p-4 flex flex-col flex-grow border-t border-gray-50">
            <h3 className="font-medium text-gray-800 mb-2 truncate" title={item.title}>
              {item.title}
            </h3>
            
            <div className="flex flex-wrap gap-1 mb-4 flex-grow content-start">
              {tags.map(tag => (
                <span key={tag} className="text-[11px] bg-gray-100 text-gray-600 px-2 py-1 rounded-md">
                  #{tag}
                </span>
              ))}
            </div>

            <div className="flex items-center gap-2 pt-2 border-t border-gray-100">
              <button
                onClick={() => onDownload(item.filename)}
                className="flex-1 flex items-center justify-center gap-1.5 py-2 text-sm font-medium text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors"
                title="다운로드"
              >
                <DownloadIcon />
                <span>다운로드</span>
              </button>
              <button
                onClick={handleCopyClick}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2 text-sm font-medium rounded-lg transition-colors ${
                  isCopied ? 'bg-green-50 text-green-700' : 'text-gray-700 bg-gray-50 hover:bg-gray-100'
                }`}
                title="클립보드에 복사"
              >
                {isCopied ? <CheckIcon /> : <CopyIcon />}
                <span>{isCopied ? '복사됨' : '복사'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
